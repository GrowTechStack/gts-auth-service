eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://gts-eureka-server:8761/eureka/}
  instance:
    prefer-ip-address: true

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:growtechstack}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:gts}
    password: ${DB_PASSWORD:gts1234}
    hikari:
      initialization-fail-timeout: -1

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    com.gts.auth: info
