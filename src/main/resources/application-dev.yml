spring:
  datasource:
    url: jdbc:mysql://localhost:3306/growtechstack?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: gts
    password: gts1234
    hikari:
      initialization-fail-timeout: -1

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dev-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dev-google-client-secret}
            scope: email, profile
          github:
            client-id: ${GITHUB_CLIENT_ID:dev-github-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:dev-github-client-secret}
            scope: read:user, user:email

logging:
  level:
    com.gts.auth: debug
    org.hibernate.orm.queries: info
